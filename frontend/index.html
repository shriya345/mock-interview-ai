<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- SCREEN 1: Setup -->
<div id="setup-screen">
    <h1>AI Mock Interview</h1>
    <p>Practice with an AI interviewer. Get instant feedback.</p>
    
    <div class="form-card">
        <input type="text" id="name-input" placeholder="Your name" />
        
        <select id="role-select">
            <option value="SDE">Software Developer (SDE)</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Backend Engineer">Backend Engineer</option>
        </select>
        
        <select id="difficulty-select">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
        </select>
        
        <button onclick="startInterview()">Start Interview</button>
    </div>
</div>

<!-- SCREEN 2: Interview -->
<div id="interview-screen" style="display:none">
    <div class="header">
        <span id="progress-text">Question 1 of 3</span>
        <span id="role-badge"></span>
    </div>
    
    <div class="question-box">
        <p id="question-text"></p>
    </div>
    
    <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
    <button id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
    
    <div id="feedback-box" style="display:none">
        <h3>AI Feedback</h3>
        <div id="feedback-text"></div>
        <div id="score-display" style="display:none">
            <div class="score-card">
                <span>Technical</span>
                <strong id="tech-score"></strong>
            </div>
            <div class="score-card">
                <span>Communication</span>
                <strong id="comm-score"></strong>
            </div>
            <div id="suggestion-text"></div>
        </div>
        <button id="next-btn" style="display:none" onclick="nextQuestion()">Next Question →</button>
    </div>
</div>

<!-- SCREEN 3: Report -->
<div id="report-screen" style="display:none">
    <h2>Interview Complete!</h2>
    <div id="report-content"></div>
    <button onclick="location.reload()">Start New Interview</button>
</div>

<script src="/static/app.js"></script>
</body>
</html>
